<!doctype html>
<html lang="en" class="t-studio">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Galleo — Live Generation · HUD</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="../marketing/theme.css" />
        <link
            rel="preload"
            as="image"
            href="https://picsum.photos/seed/galleohud/1200/800?grayscale"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            d: ["var(--fd)", "serif"],
                            s: ["var(--fu)", "sans-serif"],
                            m: ["var(--fm)", "monospace"],
                        },
                        colors: {
                            paper: "var(--bg)",
                            panel: "var(--surface)",
                            ink: "var(--ink)",
                            soft: "var(--soft)",
                            mut: "var(--muted)",
                            acc: "var(--accent)",
                            line: "var(--line)",
                        },
                    },
                },
            };
        </script>
        <style>
            /* ---------- base ---------- */
            * {
                box-sizing: border-box;
                scrollbar-width: none;
            }
            *::-webkit-scrollbar {
                display: none;
                width: 0;
                height: 0;
            }
            html,
            body {
                margin: 0;
            }
            body {
                --e: cubic-bezier(0.2, 0.7, 0.2, 1);
                background: var(--ink);
                color: var(--bg);
                font-family: var(--fu), system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
                overflow: hidden;
            }
            ::selection {
                background: var(--accent);
                color: var(--accent-ink);
            }
            .mono {
                font-family: var(--fm), monospace;
            }

            /* ---------- stage: the full-bleed deck (inverted cinematic field) ---------- */
            .stage {
                position: absolute;
                top: 0;
                left: 0;
                width: 1300px;
                height: 812px;
                overflow: hidden;
                background: var(--ink);
                color: var(--bg);
                transition:
                    background 0.55s var(--e),
                    color 0.55s var(--e);
            }
            .deck {
                position: absolute;
                inset: 0;
            }

            /* ---------- full-bleed slides ---------- */
            .slide {
                position: absolute;
                inset: 0;
                opacity: 0;
                z-index: 0;
                transition: opacity 0.62s var(--e);
            }
            .slide.in {
                opacity: 1;
            }

            /* image field */
            .bleed {
                position: absolute;
                inset: 0;
                overflow: hidden;
            }
            .bleed-img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                filter: blur(14px) grayscale(1);
                transform: scale(1.06);
                opacity: 0;
                transition:
                    filter 0.7s var(--e),
                    transform 0.7s var(--e),
                    opacity 0.7s var(--e);
            }
            .slide.developed .bleed-img {
                filter: blur(0) grayscale(1);
                transform: scale(1);
                opacity: 1;
            }
            .develop-overlay {
                position: absolute;
                inset: 0;
                z-index: 2;
                background: color-mix(in srgb, var(--accent) 40%, transparent);
                transform: translateX(0);
                opacity: 1;
                transition:
                    transform 0.7s var(--e),
                    opacity 0.7s var(--e);
            }
            .slide.developed .develop-overlay {
                transform: translateX(101%);
                opacity: 0;
            }
            .bleed.shimmer::after {
                content: "";
                position: absolute;
                inset: 0;
                z-index: 2;
                pointer-events: none;
                background: linear-gradient(
                    115deg,
                    transparent 30%,
                    color-mix(in srgb, var(--accent) 50%, transparent) 50%,
                    transparent 70%
                );
                background-size: 230% 100%;
                background-position: 140% 0;
            }
            .scrim {
                position: absolute;
                inset: 0;
                z-index: 1;
                background:
                    linear-gradient(
                        90deg,
                        color-mix(in srgb, var(--ink) 90%, transparent) 0%,
                        color-mix(in srgb, var(--ink) 56%, transparent) 40%,
                        color-mix(in srgb, var(--ink) 14%, transparent) 74%,
                        transparent 100%
                    ),
                    linear-gradient(
                        0deg,
                        color-mix(in srgb, var(--ink) 80%, transparent) 0%,
                        transparent 48%
                    );
            }
            /* typographic field (proof / momentum / ask) */
            .field {
                position: absolute;
                inset: 0;
                z-index: 0;
                background:
                    radial-gradient(
                        125% 92% at 50% 38%,
                        color-mix(in srgb, var(--accent) 10%, transparent),
                        transparent 58%
                    ),
                    var(--ink);
            }

            /* ---------- slide content ---------- */
            .slide-inner {
                position: absolute;
                inset: 0;
                z-index: 4;
                display: flex;
                padding: 66px 76px;
            }
            .lay-left .slide-inner {
                align-items: flex-end;
                justify-content: flex-start;
            }
            .lay-stats .slide-inner {
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }
            .lay-center .slide-inner {
                align-items: center;
                justify-content: center;
                text-align: center;
            }
            .content {
                min-width: 0;
            }
            .lay-left .content {
                max-width: 920px;
            }
            .lay-stats .content {
                width: 100%;
            }
            .lay-center .content {
                max-width: 1060px;
            }

            /* ---------- type primitives ---------- */
            .eyebrow {
                font-family: var(--fm), monospace;
                font-size: 0.72rem;
                letter-spacing: 0.24em;
                text-transform: uppercase;
                color: var(--accent);
                margin-bottom: 14px;
            }
            .hl {
                font-family: var(--fd), serif;
                font-weight: var(--hw, 700);
                color: var(--bg);
                letter-spacing: -0.02em;
                line-height: 1.05;
                margin: 0;
            }
            .h-cover {
                font-size: 4.2rem;
            }
            .h-beat {
                font-size: 3.4rem;
            }
            .lead {
                font-family: var(--fu), sans-serif;
                font-size: 1.22rem;
                line-height: 1.5;
                color: var(--bg);
                opacity: 0.82;
                max-width: 640px;
                margin: 22px 0 0;
            }

            .caret {
                display: inline-block;
                width: 2px;
                height: 1em;
                background: var(--accent);
                vertical-align: -0.12em;
                margin-left: 3px;
                border-radius: 1px;
            }
            .caret.big {
                height: 0.9em;
            }

            .wd {
                opacity: 0;
                transition: opacity 0.3s var(--e);
            }
            .wd.in {
                opacity: 1;
            }

            .bodylines {
                margin-top: 22px;
                display: flex;
                flex-direction: column;
                gap: 11px;
                max-width: 680px;
            }
            .bodyline {
                position: relative;
                padding-left: 22px;
                font-family: var(--fu), sans-serif;
                font-size: 1.12rem;
                line-height: 1.4;
                color: var(--bg);
                opacity: 0;
                transform: translateY(8px);
                transition:
                    opacity 0.3s var(--e),
                    transform 0.3s var(--e);
            }
            .bodyline.in {
                opacity: 0.88;
                transform: none;
            }
            .bodyline::before {
                content: "";
                position: absolute;
                left: 0;
                top: 0.62em;
                width: 11px;
                height: 2px;
                background: var(--accent);
                border-radius: 2px;
            }

            .snap,
            .rise {
                opacity: 0;
                transform: translateY(9px) scale(0.99);
                transition:
                    opacity 0.3s var(--e),
                    transform 0.3s var(--e);
            }
            .snap.in,
            .rise.in {
                opacity: 1;
                transform: none;
            }

            /* ---------- proof · stat triplet ---------- */
            .proof-cap {
                font-family: var(--fd), serif;
                font-weight: var(--hw, 700);
                font-size: 1.7rem;
                color: var(--bg);
                letter-spacing: -0.01em;
                margin-bottom: 8px;
            }
            .statrow {
                display: flex;
                gap: 46px;
                width: 100%;
                margin-top: 36px;
                align-items: flex-start;
            }
            .stat {
                flex: 1 1 0;
                opacity: 0;
                transform: translateY(16px);
                transition:
                    opacity 0.42s var(--e),
                    transform 0.42s var(--e);
            }
            .stat.reveal {
                opacity: 1;
                transform: none;
            }
            .snum {
                font-family: var(--fd), serif;
                font-weight: var(--hw, 700);
                font-size: 5.6rem;
                line-height: 0.92;
                color: var(--accent);
                letter-spacing: -0.03em;
            }
            .slabel {
                font-family: var(--fm), monospace;
                font-size: 0.78rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: color-mix(in srgb, var(--bg) 68%, transparent);
                margin-top: 16px;
                line-height: 1.4;
            }

            /* ---------- momentum · pull-quote ---------- */
            .qmark {
                font-family: var(--fd), serif;
                font-size: 4.4rem;
                line-height: 0.2;
                height: 2rem;
                color: var(--accent);
                opacity: 0.55;
            }
            .pq {
                font-family: var(--fd), serif;
                font-style: italic;
                font-weight: 500;
                font-size: 3.3rem;
                line-height: 1.22;
                letter-spacing: -0.01em;
                color: var(--bg);
                margin: 30px auto 0;
                max-width: 1000px;
            }
            .attrib {
                font-family: var(--fm), monospace;
                font-size: 0.82rem;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                color: color-mix(in srgb, var(--bg) 64%, transparent);
                margin-top: 34px;
            }

            /* ---------- ask ---------- */
            .askrow {
                display: flex;
                align-items: baseline;
                justify-content: center;
                gap: 18px;
            }
            .ask-num {
                font-family: var(--fd), serif;
                font-weight: var(--hw, 700);
                font-size: 7.4rem;
                line-height: 0.86;
                color: var(--accent);
                letter-spacing: -0.03em;
            }
            .ask-word {
                font-family: var(--fd), serif;
                font-weight: var(--hw, 700);
                font-size: 2.6rem;
                color: var(--bg);
                opacity: 0.92;
                letter-spacing: -0.01em;
            }
            .ask-line {
                font-family: var(--fu), sans-serif;
                font-size: 1.35rem;
                line-height: 1.45;
                color: var(--bg);
                opacity: 0.82;
                margin: 26px auto 0;
                max-width: 680px;
            }
            .ask-close {
                font-family: var(--fm), monospace;
                font-size: 0.82rem;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--accent);
                margin-top: 30px;
            }

            /* ---------- viewfinder framing ---------- */
            .cnr {
                position: absolute;
                width: 26px;
                height: 26px;
                border: 2px solid color-mix(in srgb, var(--bg) 50%, transparent);
                opacity: 0.5;
                z-index: 6;
                pointer-events: none;
                border-radius: 2px;
            }
            .cnr.tl {
                top: 24px;
                left: 24px;
                border-right: 0;
                border-bottom: 0;
            }
            .cnr.tr {
                top: 24px;
                right: 24px;
                border-left: 0;
                border-bottom: 0;
            }
            .cnr.bl {
                bottom: 24px;
                left: 24px;
                border-right: 0;
                border-top: 0;
            }
            .fr-label {
                position: absolute;
                top: 30px;
                left: 60px;
                z-index: 6;
                display: flex;
                align-items: center;
                gap: 9px;
                font-family: var(--fm), monospace;
                font-size: 0.68rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: color-mix(in srgb, var(--bg) 58%, transparent);
            }
            .fr-live {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--accent);
            }
            .fr-title {
                position: absolute;
                top: 30px;
                right: 60px;
                z-index: 6;
                text-align: right;
                font-family: var(--fm), monospace;
                font-size: 0.68rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: color-mix(in srgb, var(--bg) 58%, transparent);
            }
            .fr-title .ht-n {
                color: var(--accent);
            }

            /* ---------- glass HUD (co-pilot) ---------- */
            .hud {
                position: absolute;
                right: 30px;
                bottom: 30px;
                width: 356px;
                z-index: 7;
                background: color-mix(in srgb, var(--surface) 74%, transparent);
                -webkit-backdrop-filter: blur(18px) saturate(1.3);
                backdrop-filter: blur(18px) saturate(1.3);
                border: 1px solid color-mix(in srgb, var(--line) 92%, transparent);
                border-radius: calc(var(--radius) * 0.82);
                box-shadow:
                    0 28px 64px -26px rgba(0, 0, 0, 0.66),
                    inset 0 1px 0 color-mix(in srgb, var(--bg) 32%, transparent);
                color: var(--ink);
                padding: 15px 16px 16px;
                transition:
                    background 0.55s var(--e),
                    border-color 0.55s var(--e),
                    color 0.55s var(--e),
                    opacity 0.5s var(--e),
                    transform 0.5s var(--e);
            }
            .hud.idle {
                opacity: 0;
                transform: translateY(12px);
                pointer-events: none;
            }
            .hud-top {
                display: flex;
                align-items: center;
                gap: 9px;
            }
            .hud-glyph {
                width: 25px;
                height: 25px;
                display: grid;
                place-items: center;
                flex: 0 0 auto;
                font-family: var(--fd), serif;
                font-weight: 800;
                font-size: 0.92rem;
                background: var(--accent);
                color: var(--accent-ink);
                border-radius: calc(var(--radius) * 0.34);
            }
            .hud-name {
                font-family: var(--fd), serif;
                font-weight: 700;
                font-size: 1rem;
                letter-spacing: -0.01em;
            }
            .hud-name b {
                color: var(--accent);
                font-weight: 700;
            }
            .hud-live {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--accent);
                flex: 0 0 auto;
            }
            .hud-count {
                margin-left: auto;
                font-family: var(--fm), monospace;
                font-size: 0.66rem;
                letter-spacing: 0.06em;
                color: var(--muted);
                white-space: nowrap;
            }
            .hud-count b {
                color: var(--accent);
                font-weight: 500;
            }

            .hud-seg {
                display: flex;
                gap: 5px;
                margin: 13px 0 12px;
            }
            .seg {
                flex: 1;
                height: 4px;
                border-radius: 3px;
                background: color-mix(in srgb, var(--ink) 15%, transparent);
                transition: background 0.35s var(--e);
            }
            .seg.done,
            .seg.on {
                background: var(--accent);
            }

            .hud-narr {
                height: 98px;
                overflow: hidden;
                position: relative;
            }
            .nl {
                display: flex;
                gap: 9px;
                align-items: flex-start;
                padding: 4px 0;
                transition:
                    opacity 0.4s var(--e),
                    transform 0.34s var(--e);
            }
            .nl.pre {
                opacity: 0;
                transform: translateY(7px);
            }
            .nl:not(.active):not(.pre) {
                opacity: 0.45;
            }
            .nl-dot {
                flex: 0 0 auto;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                display: grid;
                place-items: center;
                background: var(--accent);
                margin-top: 2px;
            }
            .nl-dot .ck {
                color: var(--accent-ink);
                font-size: 0.55rem;
                line-height: 1;
                opacity: 0;
            }
            .nl:not(.active) .nl-dot .ck {
                opacity: 1;
            }
            .nl.sub .nl-dot {
                background: transparent;
                color: var(--accent);
                font-size: 0.74rem;
            }
            .nl-tx {
                font-family: var(--fu), sans-serif;
                font-size: 0.84rem;
                line-height: 1.45;
                color: var(--ink);
            }
            .nl-tx .mono {
                font-family: var(--fm), monospace;
                color: var(--accent);
                font-size: 0.85em;
            }

            /* ---------- intake (pre-generation brief) ---------- */
            .intake {
                position: absolute;
                inset: 0;
                z-index: 9;
                display: grid;
                place-items: center;
                opacity: 0;
                visibility: hidden;
                transition:
                    opacity 0.5s var(--e),
                    visibility 0.5s var(--e);
                background:
                    radial-gradient(
                        120% 95% at 50% 42%,
                        color-mix(in srgb, var(--accent) 13%, transparent),
                        transparent 60%
                    ),
                    var(--ink);
            }
            .intake.show {
                opacity: 1;
                visibility: visible;
            }
            .intake-panel {
                width: 724px;
                max-width: 92%;
                background: color-mix(in srgb, var(--surface) 80%, transparent);
                -webkit-backdrop-filter: blur(22px) saturate(1.35);
                backdrop-filter: blur(22px) saturate(1.35);
                border: 1px solid color-mix(in srgb, var(--line) 92%, transparent);
                border-radius: calc(var(--radius) * 1.05);
                box-shadow:
                    0 42px 92px -34px rgba(0, 0, 0, 0.72),
                    inset 0 1px 0 color-mix(in srgb, var(--bg) 34%, transparent);
                color: var(--ink);
                padding: 26px 28px 24px;
                transform: translateY(14px) scale(0.982);
                opacity: 0;
                transition:
                    opacity 0.5s var(--e),
                    transform 0.5s var(--e),
                    background 0.55s var(--e),
                    border-color 0.55s var(--e),
                    color 0.55s var(--e);
            }
            .intake.show .intake-panel {
                opacity: 1;
                transform: none;
            }

            .ip-head {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 18px;
            }
            .ip-title {
                font-family: var(--fd), serif;
                font-weight: 700;
                font-size: 1.04rem;
                letter-spacing: -0.01em;
            }
            .ip-title b {
                color: var(--accent);
                font-weight: 700;
            }
            .ip-kbd {
                margin-left: auto;
                font-family: var(--fm), monospace;
                font-size: 0.6rem;
                letter-spacing: 0.1em;
                color: var(--muted);
                border: 1px solid var(--line);
                border-radius: 6px;
                padding: 3px 7px;
            }

            .ip-label {
                font-family: var(--fm), monospace;
                font-size: 0.62rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--accent);
                margin-bottom: 9px;
            }
            .ip-prompt {
                min-height: 84px;
                border: 1px solid var(--line);
                border-radius: calc(var(--radius) * 0.6);
                background: color-mix(in srgb, var(--bg) 55%, transparent);
                padding: 14px 15px;
                font-family: var(--fu), sans-serif;
                font-size: 1.06rem;
                line-height: 1.5;
                color: var(--ink);
            }
            .ip-prompt .caret {
                height: 1.05em;
                vertical-align: -0.16em;
            }

            .ip-row {
                display: flex;
                align-items: center;
                gap: 14px;
                margin-top: 16px;
                flex-wrap: wrap;
            }
            .ip-surface {
                display: inline-flex;
                gap: 5px;
                background: color-mix(in srgb, var(--ink) 6%, transparent);
                padding: 4px;
                border-radius: 999px;
                border: 1px solid var(--line);
            }
            .surf {
                font-family: var(--fu), sans-serif;
                font-size: 0.82rem;
                font-weight: 600;
                padding: 6px 15px;
                border-radius: 999px;
                border: 0;
                background: transparent;
                color: var(--muted);
                cursor: pointer;
                transition:
                    color 0.25s var(--e),
                    background 0.25s var(--e);
            }
            .surf.on {
                background: var(--accent);
                color: var(--accent-ink);
            }
            .ip-chips {
                display: flex;
                gap: 7px;
                flex-wrap: wrap;
            }
            .chip {
                font-family: var(--fm), monospace;
                font-size: 0.64rem;
                letter-spacing: 0.04em;
                white-space: nowrap;
                padding: 5px 10px;
                border-radius: 999px;
                border: 1px solid var(--line);
                color: var(--ink);
                background: color-mix(in srgb, var(--bg) 45%, transparent);
                opacity: 0;
                transform: translateY(7px);
                transition:
                    opacity 0.32s var(--e),
                    transform 0.32s var(--e);
            }
            .chip.in {
                opacity: 1;
                transform: none;
            }
            .chip b {
                color: var(--muted);
                font-weight: 500;
                margin-right: 5px;
            }

            .ip-ctx {
                margin-top: 18px;
                border-top: 1px solid var(--line);
                padding-top: 16px;
            }
            .ipc-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 11px;
            }
            .ipc-label {
                font-family: var(--fm), monospace;
                font-size: 0.62rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--accent);
            }
            .ipc-ground {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                font-family: var(--fm), monospace;
                font-size: 0.62rem;
                letter-spacing: 0.05em;
                color: var(--muted);
                opacity: 0;
                transform: translateY(6px);
                transition:
                    opacity 0.4s var(--e),
                    transform 0.4s var(--e);
            }
            .ipc-ground.in {
                opacity: 1;
                transform: none;
            }
            .gdot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--accent);
                display: inline-block;
                flex: 0 0 auto;
            }
            .ip-atts {
                display: flex;
                gap: 11px;
            }
            .att {
                flex: 1 1 0;
                display: flex;
                align-items: center;
                gap: 11px;
                min-width: 0;
                border: 1px solid var(--line);
                border-radius: calc(var(--radius) * 0.55);
                background: color-mix(in srgb, var(--bg) 55%, transparent);
                padding: 11px 13px;
                opacity: 0;
                transform: translateY(10px) scale(0.99);
                transition:
                    opacity 0.4s var(--e),
                    transform 0.4s var(--e),
                    border-color 0.4s var(--e);
            }
            .att.in {
                opacity: 1;
                transform: none;
                border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
            }
            .att-ic {
                width: 30px;
                height: 30px;
                flex: 0 0 auto;
                display: grid;
                place-items: center;
                font-size: 1.02rem;
                border-radius: calc(var(--radius) * 0.4);
                background: color-mix(in srgb, var(--accent) 13%, transparent);
            }
            .att-name {
                font-family: var(--fu), sans-serif;
                font-size: 0.92rem;
                color: var(--ink);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .att-kind {
                margin-left: auto;
                flex: 0 0 auto;
                font-family: var(--fm), monospace;
                font-size: 0.56rem;
                letter-spacing: 0.12em;
                color: var(--accent);
                border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line));
                border-radius: 5px;
                padding: 2px 6px;
            }

            .ip-generate {
                margin-top: 22px;
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                font-family: var(--fu), sans-serif;
                font-size: 1rem;
                font-weight: 700;
                letter-spacing: 0.01em;
                padding: 14px 18px;
                border: 0;
                border-radius: calc(var(--radius) * 0.62);
                cursor: pointer;
                background: var(--accent);
                color: var(--accent-ink);
                transition:
                    transform 0.2s var(--e),
                    box-shadow 0.3s var(--e),
                    filter 0.2s var(--e);
            }
            .ip-generate .gen-arrow {
                transition: transform 0.3s var(--e);
            }
            .ip-generate.pressed {
                transform: scale(0.974);
                filter: brightness(0.94);
                box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 30%, transparent);
            }
            .ip-generate.pressed .gen-arrow {
                transform: translateX(5px);
            }

            /* ---------- animation (gated) ---------- */
            @media (prefers-reduced-motion: no-preference) {
                .fr-live,
                .hud-live {
                    animation: lpulse 1.5s var(--e) infinite;
                }
                .caret {
                    animation: blink 1s steps(1) infinite;
                }
                .seg.on {
                    animation: segpulse 1.2s var(--e) infinite;
                }
                .nl.active .nl-dot {
                    animation: pulse 1.2s var(--e) infinite;
                }
                .bleed.shimmer::after {
                    animation: sheen 1.3s var(--e) infinite;
                }
                .ipc-ground .gdot {
                    animation: lpulse 1.5s var(--e) infinite;
                }
                .ip-generate.pulse {
                    animation: genpulse 1.25s var(--e) infinite;
                }
                @keyframes genpulse {
                    0% {
                        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 50%, transparent);
                    }
                    70% {
                        box-shadow: 0 0 0 13px transparent;
                    }
                    100% {
                        box-shadow: 0 0 0 0 transparent;
                    }
                }
                @keyframes blink {
                    0%,
                    49% {
                        opacity: 1;
                    }
                    50%,
                    100% {
                        opacity: 0;
                    }
                }
                @keyframes sheen {
                    0% {
                        background-position: 140% 0;
                    }
                    100% {
                        background-position: -40% 0;
                    }
                }
                @keyframes pulse {
                    0% {
                        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 55%, transparent);
                    }
                    70% {
                        box-shadow: 0 0 0 6px transparent;
                    }
                    100% {
                        box-shadow: 0 0 0 0 transparent;
                    }
                }
                @keyframes lpulse {
                    0% {
                        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 60%, transparent);
                    }
                    70% {
                        box-shadow: 0 0 0 6px transparent;
                    }
                    100% {
                        box-shadow: 0 0 0 0 transparent;
                    }
                }
                @keyframes segpulse {
                    0% {
                        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 55%, transparent);
                    }
                    70% {
                        box-shadow: 0 0 0 5px transparent;
                    }
                    100% {
                        box-shadow: 0 0 0 0 transparent;
                    }
                }
            }
            /* reduced motion: kill transitions for instant build */
            body.rm .slide,
            body.rm .bleed-img,
            body.rm .develop-overlay,
            body.rm .wd,
            body.rm .bodyline,
            body.rm .stat,
            body.rm .snap,
            body.rm .rise,
            body.rm .nl,
            body.rm .intake,
            body.rm .intake-panel,
            body.rm .chip,
            body.rm .att,
            body.rm .ipc-ground,
            body.rm .ip-generate,
            body.rm .hud {
                transition: none;
            }
        </style>
    </head>
    <body>
        <!-- ============================= STAGE ============================= -->
        <div class="stage">
            <div class="deck" id="deck">
                <!-- 01 · cover (image) -->
                <section class="slide lay-left" data-beat="0">
                    <div class="bleed shimmer">
                        <img
                            class="bleed-img"
                            alt="Control room at dusk"
                            src="https://picsum.photos/seed/galleohud/1200/800?grayscale"
                        />
                        <div class="scrim"></div>
                        <div class="develop-overlay"></div>
                    </div>
                    <div class="slide-inner"><div class="content"></div></div>
                </section>

                <!-- 02 · the problem (image) -->
                <section class="slide lay-left" data-beat="1">
                    <div class="bleed shimmer">
                        <img
                            class="bleed-img"
                            alt="Substation at dusk"
                            src="https://picsum.photos/seed/galleohud/1200/800?grayscale"
                        />
                        <div class="scrim"></div>
                        <div class="develop-overlay"></div>
                    </div>
                    <div class="slide-inner"><div class="content"></div></div>
                </section>

                <!-- 03 · the shift (image) -->
                <section class="slide lay-left" data-beat="2">
                    <div class="bleed shimmer">
                        <img
                            class="bleed-img"
                            alt="Grid control software"
                            src="https://picsum.photos/seed/galleohud/1200/800?grayscale"
                        />
                        <div class="scrim"></div>
                        <div class="develop-overlay"></div>
                    </div>
                    <div class="slide-inner"><div class="content"></div></div>
                </section>

                <!-- 04 · the proof (stat triplet) -->
                <section class="slide lay-stats" data-beat="3">
                    <div class="field"></div>
                    <div class="slide-inner"><div class="content"></div></div>
                </section>

                <!-- 05 · momentum (pull-quote) -->
                <section class="slide lay-center" data-beat="4">
                    <div class="field"></div>
                    <div class="slide-inner"><div class="content"></div></div>
                </section>

                <!-- 06 · the ask -->
                <section class="slide lay-center" data-beat="5">
                    <div class="field"></div>
                    <div class="slide-inner"><div class="content"></div></div>
                </section>
            </div>

            <!-- viewfinder framing -->
            <span class="cnr tl"></span><span class="cnr tr"></span><span class="cnr bl"></span>
            <div class="fr-label"><span class="fr-live"></span> Galleo · Live Generation</div>
            <div class="fr-title" id="frTitle"><span class="ht-n">—</span> · READY</div>

            <!-- glass HUD · co-pilot -->
            <aside class="hud idle" id="hud">
                <div class="hud-top">
                    <span class="hud-glyph">G</span>
                    <span class="hud-name">Galleo · <b>Generating</b></span>
                    <span class="hud-live"></span>
                    <span class="hud-count" id="hudCount">beat <b>0</b> / 6</span>
                </div>
                <div class="hud-seg" id="hudSeg">
                    <span class="seg"></span><span class="seg"></span><span class="seg"></span>
                    <span class="seg"></span><span class="seg"></span><span class="seg"></span>
                </div>
                <div class="hud-narr" id="narr"></div>
            </aside>

            <!-- intake · the brief (plays before the build) -->
            <div class="intake" id="intake">
                <div class="intake-panel">
                    <div class="ip-head">
                        <span class="hud-glyph">G</span>
                        <span class="ip-title">New artifact · <b>brief</b></span>
                        <span class="ip-kbd">⌘ ↵</span>
                    </div>

                    <div class="ip-label">Prompt</div>
                    <div class="ip-prompt" id="ipPrompt"></div>

                    <div class="ip-row">
                        <div class="ip-surface" id="ipSurface">
                            <button class="surf on" type="button">Deck</button>
                            <button class="surf" type="button">Doc</button>
                            <button class="surf" type="button">Site</button>
                        </div>
                        <div class="ip-chips" id="ipChips">
                            <span class="chip"><b>Goal</b>Pitch</span>
                            <span class="chip"><b>Who</b>Investors</span>
                            <span class="chip"><b>Tone</b>Bold</span>
                            <span class="chip"><b>Length</b>Standard</span>
                        </div>
                    </div>

                    <div class="ip-ctx">
                        <div class="ipc-head">
                            <span class="ipc-label">Add context</span>
                            <span class="ipc-ground" id="ipGround"
                                ><span class="gdot"></span> grounding in your context</span
                            >
                        </div>
                        <div class="ip-atts" id="ipAtts">
                            <div class="att">
                                <span class="att-ic">📄</span
                                ><span class="att-name">aldon-onepager.pdf</span
                                ><span class="att-kind">DOC</span>
                            </div>
                            <div class="att">
                                <span class="att-ic">🔗</span><span class="att-name">aldon.com</span
                                ><span class="att-kind">SITE</span>
                            </div>
                        </div>
                    </div>

                    <button class="ip-generate" id="ipGen" type="button">
                        <span>Generate</span><span class="gen-arrow">→</span>
                    </button>
                </div>
            </div>
        </div>

        <script>
            (function () {
                "use strict";
                const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;
                if (RM) document.body.classList.add("rm");

                const $ = (s, r = document) => r.querySelector(s);
                const el = (t, c) => {
                    const e = document.createElement(t);
                    if (c) e.className = c;
                    return e;
                };
                const raf = (fn) => requestAnimationFrame(fn);

                const narr = $("#narr");
                const frTitle = $("#frTitle");
                const hudCount = $("#hudCount");
                const segs = [...document.querySelectorAll("#hudSeg .seg")];
                const slides = [...document.querySelectorAll(".slide")];

                const hud = $("#hud");
                const intake = $("#intake");
                const ipPrompt = $("#ipPrompt");
                const ipChips = $("#ipChips");
                const ipAtts = $("#ipAtts");
                const ipGround = $("#ipGround");
                const ipGen = $("#ipGen");

                const PROMPT =
                    "An investor pitch deck for Aldon — we turn idle commercial HVAC into virtual power plants. Raising a $6M seed, for climate + infra VCs. Bold but credible.";

                // ---- durations ----
                const T = RM
                    ? {
                          boot: 160,
                          cross: 0,
                          head: 0,
                          quote: 0,
                          word: 6,
                          line: 30,
                          develop: 0,
                          snap: 40,
                          count: 240,
                          narr: 0,
                          settle: 80,
                          hold: 900,
                          gap: 120,
                          iBoot: 120,
                          iType: 0,
                          iGap: 80,
                          iStag: 30,
                          iAtt: 60,
                          iPulse: 200,
                          iPress: 90,
                          iCross: 0,
                      }
                    : {
                          boot: 480,
                          cross: 560,
                          head: 19,
                          quote: 16,
                          word: 40,
                          line: 150,
                          develop: 620,
                          snap: 150,
                          count: 900,
                          narr: 8,
                          settle: 240,
                          hold: 1200,
                          gap: 240,
                          iBoot: 380,
                          iType: 10,
                          iGap: 230,
                          iStag: 90,
                          iAtt: 260,
                          iPulse: 640,
                          iPress: 300,
                          iCross: 480,
                      };

                // ---- run token: only the live run's waits resolve ----
                let RUN = null;
                function wait(ms) {
                    const my = RUN;
                    return new Promise((r) =>
                        setTimeout(() => {
                            if (my === RUN) r();
                        }, ms),
                    );
                }

                // ---- narration (co-pilot stream) ----
                let activeNarr = null;
                async function narrate(segArr, opt) {
                    opt = opt || {};
                    if (activeNarr) activeNarr.classList.remove("active");
                    const line = el("div", "nl pre active" + (opt.sub ? " sub" : ""));
                    const dot = el("span", "nl-dot");
                    dot.innerHTML = opt.sub ? "&#10551;" : '<span class="ck">&#10003;</span>';
                    const tx = el("span", "nl-tx");
                    line.append(dot, tx);
                    narr.appendChild(line);
                    activeNarr = line;
                    raf(() => line.classList.remove("pre"));
                    narr.scrollTop = narr.scrollHeight;
                    await typeSegs(tx, segArr, T.narr, false);
                    narr.scrollTop = narr.scrollHeight;
                }

                // ---- type-on across mono/plain segments (with caret) ----
                async function typeSegs(node, parts, speed, big) {
                    node.textContent = "";
                    const caret = el("span", "caret" + (big ? " big" : ""));
                    node.appendChild(caret);
                    for (const seg of parts) {
                        const s = el("span", seg.m ? "mono" : null);
                        node.insertBefore(s, caret);
                        if (speed <= 0) {
                            s.textContent = seg.t;
                        } else {
                            for (const ch of seg.t) {
                                s.append(ch);
                                await wait(speed);
                            }
                        }
                    }
                    await wait(speed <= 0 ? 40 : 320);
                    caret.remove();
                }

                async function streamWords(node, text) {
                    node.textContent = "";
                    const words = text.split(" ");
                    for (let i = 0; i < words.length; i++) {
                        const s = el("span", "wd");
                        s.textContent = (i ? " " : "") + words[i];
                        node.appendChild(s);
                        raf(() => s.classList.add("in"));
                        await wait(T.word);
                    }
                }

                async function streamLines(node, lines) {
                    for (const ln of lines) {
                        const d = el("div", "bodyline");
                        d.textContent = ln;
                        node.appendChild(d);
                        raf(() => d.classList.add("in"));
                        await wait(T.line);
                    }
                }

                function countUp(node, o) {
                    const my = RUN,
                        start = performance.now(),
                        dur = o.dur;
                    const fmt = (v) => (o.pre || "") + v.toFixed(o.dec) + (o.suf || "");
                    function frame(now) {
                        if (my !== RUN) return;
                        const p = Math.min(1, (now - start) / dur);
                        const e = 1 - Math.pow(1 - p, 3);
                        node.textContent = fmt(o.to * e);
                        if (p < 1) requestAnimationFrame(frame);
                        else node.textContent = fmt(o.to);
                    }
                    requestAnimationFrame(frame);
                }

                // ---- slide / hud helpers ----
                let curSlide = null;
                function crossTo(s) {
                    s.classList.add("in");
                    s.style.zIndex = 2;
                    const old = curSlide;
                    curSlide = s;
                    return wait(T.cross).then(() => {
                        if (old && old !== s) {
                            old.classList.remove("in");
                            old.style.zIndex = 0;
                        }
                        s.style.zIndex = 1;
                    });
                }
                function developSlide(s) {
                    const b = $(".bleed", s);
                    if (b) b.classList.remove("shimmer");
                    s.classList.add("developed");
                }
                function showSnaps(s) {
                    s.querySelectorAll(".snap").forEach((n) => raf(() => n.classList.add("in")));
                }
                function showRise(n) {
                    raf(() => n.classList.add("in"));
                }

                function segActive(i) {
                    segs[i].classList.remove("done");
                    segs[i].classList.add("on");
                    hudCount.innerHTML = "beat <b>" + (i + 1) + "</b> / 6";
                }
                function segDone(i) {
                    segs[i].classList.remove("on");
                    segs[i].classList.add("done");
                }
                function setTitle(n, label) {
                    frTitle.innerHTML = '<span class="ht-n">' + n + "</span> · " + label;
                }

                // ---- narration copy (mono = technical tokens) ----
                const SEG = {
                    plan: [{ t: "Shaping the story — " }, { t: "6 beats", m: true }],
                    A: [
                        { t: "beat 1 · " },
                        { t: "cover", m: true },
                        { t: " → open on the thesis" },
                    ],
                    Asub: [{ t: "sourcing " }, { t: "'control room, dusk'", m: true }],
                    B: [
                        { t: "beat 2 · the problem → " },
                        { t: "full-bleed", m: true },
                        { t: ", the strain shows" },
                    ],
                    C: [{ t: "beat 3 · the shift → " }, { t: "the turn lands", m: true }],
                    D: [
                        { t: "beat 4 · proof → " },
                        { t: "stat triplet", m: true },
                        { t: ", reads as scale" },
                    ],
                    E: [
                        { t: "beat 5 · momentum → " },
                        { t: "pull-quote", m: true },
                        { t: " for air + trust" },
                    ],
                    F: [{ t: "beat 6 · the ask → " }, { t: "drafting the close…", m: true }],
                };

                // ---- per-beat builders ----
                async function buildCover(s) {
                    const c = $(".content", s);
                    c.innerHTML =
                        '<div class="eyebrow snap">NORTHWIND ENERGY · SEED ROUND</div>' +
                        '<h1 class="hl h-cover"></h1>' +
                        '<p class="lead"></p>';
                    showSnaps(s);
                    await wait(T.snap);
                    await typeSegs(
                        $(".h-cover", s),
                        [{ t: "The grid was built for a century that's ending." }],
                        T.head,
                        true,
                    );
                    await streamWords(
                        $(".lead", s),
                        "Software-defined, storage-first, carbon-aware.",
                    );
                }
                async function buildBeat(s, eyebrow, head, lines) {
                    const c = $(".content", s);
                    c.innerHTML =
                        '<div class="eyebrow snap">' +
                        eyebrow +
                        "</div>" +
                        '<h2 class="hl h-beat"></h2>' +
                        '<div class="bodylines"></div>';
                    showSnaps(s);
                    await wait(T.snap);
                    await typeSegs($(".h-beat", s), [{ t: head }], T.head, true);
                    await streamLines($(".bodylines", s), lines);
                }
                async function buildProof(s) {
                    const c = $(".content", s);
                    c.innerHTML =
                        '<div class="eyebrow snap">THE PROOF</div>' +
                        '<div class="proof-cap snap">What changes when the grid gets smart</div>' +
                        '<div class="statrow">' +
                        '<div class="stat"><div class="snum">0</div><div class="slabel">capacity unlocked / node</div></div>' +
                        '<div class="stat"><div class="snum">0</div><div class="slabel">grids live by year-end</div></div>' +
                        '<div class="stat"><div class="snum">$0</div><div class="slabel">saved / MWh shifted</div></div>' +
                        "</div>";
                    showSnaps(s);
                    await wait(T.snap);
                    const stats = [...s.querySelectorAll(".stat")];
                    const data = [
                        { to: 3.4, dec: 1, suf: "×" },
                        { to: 128, dec: 0 },
                        { to: 760, dec: 0, pre: "$" },
                    ];
                    for (let i = 0; i < stats.length; i++) {
                        stats[i].classList.add("reveal");
                        countUp(
                            stats[i].querySelector(".snum"),
                            Object.assign({ dur: T.count }, data[i]),
                        );
                        await wait(230);
                    }
                    await wait(T.count);
                }
                async function buildMomentum(s) {
                    const c = $(".content", s);
                    c.innerHTML =
                        '<div class="eyebrow snap">MOMENTUM</div>' +
                        '<div class="qmark snap">“</div>' +
                        '<blockquote class="pq"></blockquote>' +
                        '<div class="attrib rise">DANA OKAFOR · GRID OPS, MERIDIAN POWER</div>';
                    showSnaps(s);
                    await wait(T.snap);
                    await typeSegs(
                        $(".pq", s),
                        [
                            {
                                t: "Northwind did in eight months what our utility couldn't in eight years.",
                            },
                        ],
                        T.quote,
                        true,
                    );
                    showRise($(".attrib", s));
                    await wait(T.settle + 200);
                }
                async function buildAsk(s) {
                    const c = $(".content", s);
                    c.innerHTML =
                        '<div class="eyebrow snap">THE ASK</div>' +
                        '<div class="askrow"><span class="ask-num">$0</span><span class="ask-word rise">seed round</span></div>' +
                        '<div class="ask-line rise">To put software-defined power on 1,000 grids by 2028.</div>' +
                        '<div class="ask-close rise">Lead the round →</div>';
                    showSnaps(s);
                    await wait(T.snap);
                    countUp($(".ask-num", s), { to: 6, dec: 0, pre: "$", suf: "M", dur: T.count });
                    showRise($(".ask-word", s));
                    await wait(T.count);
                    showRise($(".ask-line", s));
                    await wait(T.settle);
                    showRise($(".ask-close", s));
                    await wait(T.settle);
                }

                // ---- reset for a fresh run ----
                function reset() {
                    slides.forEach((s) => {
                        s.classList.remove("in", "developed");
                        s.style.zIndex = 0;
                        s.style.opacity = "";
                        const b = $(".bleed", s);
                        if (b) b.classList.add("shimmer");
                        const c = $(".content", s);
                        if (c) c.innerHTML = "";
                    });
                    segs.forEach((x) => x.classList.remove("done", "on"));
                    narr.innerHTML = "";
                    activeNarr = null;
                    hudCount.innerHTML = "beat <b>0</b> / 6";
                    setTitle("—", "READY");
                    curSlide = null;
                }

                // ---- intake: type-on into the prompt field (leaves a blinking caret) ----
                async function typePrompt(node, text, speed) {
                    node.textContent = "";
                    const span = el("span");
                    node.appendChild(span);
                    const caret = el("span", "caret");
                    node.appendChild(caret);
                    if (speed <= 0) {
                        span.textContent = text;
                    } else {
                        for (const ch of text) {
                            span.append(ch);
                            await wait(speed);
                        }
                    }
                }

                function showIntake() {
                    intake.classList.add("show");
                    hud.classList.add("idle");
                }
                function enterBuild() {
                    intake.classList.remove("show");
                    hud.classList.remove("idle");
                }

                async function revealChips() {
                    for (const c of ipChips.querySelectorAll(".chip")) {
                        c.classList.add("in");
                        await wait(T.iStag);
                    }
                }
                async function revealContext() {
                    ipGround.classList.add("in");
                    for (const a of ipAtts.querySelectorAll(".att")) {
                        a.classList.add("in");
                        await wait(T.iAtt);
                    }
                }
                async function pressGenerate() {
                    ipGen.classList.add("pulse");
                    await wait(T.iPulse);
                    ipGen.classList.remove("pulse");
                    ipGen.classList.add("pressed");
                    await wait(T.iPress);
                }

                function resetIntake() {
                    ipPrompt.textContent = "";
                    ipChips.querySelectorAll(".chip").forEach((c) => c.classList.remove("in"));
                    ipAtts.querySelectorAll(".att").forEach((a) => a.classList.remove("in"));
                    ipGround.classList.remove("in");
                    ipGen.classList.remove("pulse", "pressed");
                    intake.classList.remove("show");
                    hud.classList.add("idle");
                }

                async function intakePhase() {
                    setTitle("00", "INTAKE");
                    showIntake();
                    await wait(T.iBoot);
                    await typePrompt(ipPrompt, PROMPT, T.iType); // 1 · prompt types on
                    await wait(T.iGap);
                    await revealChips(); // 2 · surface + auto-derived chips
                    await wait(T.iGap);
                    await revealContext(); // 3 · attachments + grounding cue
                    await wait(T.iGap);
                    await pressGenerate(); // 4 · Generate pulses + presses
                    enterBuild(); // → transition into the build
                    await wait(T.iCross);
                }

                // ============================ TIMELINE ============================
                async function sequence() {
                    await wait(T.boot);
                    await narrate(SEG.plan);
                    await wait(T.gap);

                    /* 01 · cover */
                    segActive(0);
                    setTitle("01", "COVER");
                    crossTo(slides[0]);
                    await narrate(SEG.A);
                    await narrate(SEG.Asub, { sub: true });
                    developSlide(slides[0]);
                    await buildCover(slides[0]);
                    segDone(0);
                    await wait(T.settle);

                    /* 02 · the problem */
                    segActive(1);
                    setTitle("02", "THE PROBLEM");
                    crossTo(slides[1]);
                    await narrate(SEG.B);
                    developSlide(slides[1]);
                    await buildBeat(
                        slides[1],
                        "THE PROBLEM",
                        "Demand is climbing. The wires aren't.",
                        [
                            "Peak load up 19% in five years.",
                            "Transmission build-out stalled since 2009.",
                        ],
                    );
                    segDone(1);
                    await wait(T.settle);

                    /* 03 · the shift */
                    segActive(2);
                    setTitle("03", "THE SHIFT");
                    crossTo(slides[2]);
                    await narrate(SEG.C);
                    developSlide(slides[2]);
                    await buildBeat(slides[2], "THE SHIFT", "So we rebuilt it in software.", [
                        "Dispatched by code, not poured in concrete.",
                        "Every blackout is a market the old grid can't serve.",
                    ]);
                    segDone(2);
                    await wait(T.settle);

                    /* 04 · the proof */
                    segActive(3);
                    setTitle("04", "THE PROOF");
                    crossTo(slides[3]);
                    await narrate(SEG.D);
                    await buildProof(slides[3]);
                    segDone(3);
                    await wait(T.settle);

                    /* 05 · momentum */
                    segActive(4);
                    setTitle("05", "MOMENTUM");
                    crossTo(slides[4]);
                    await narrate(SEG.E);
                    await buildMomentum(slides[4]);
                    segDone(4);
                    await wait(T.settle);

                    /* 06 · the ask */
                    segActive(5);
                    setTitle("06", "THE ASK");
                    crossTo(slides[5]);
                    await narrate(SEG.F);
                    await buildAsk(slides[5]);
                    segDone(5);

                    await wait(T.hold);
                }

                // ---- loop: INTAKE → build → hold → replay ----
                async function loop() {
                    await intakePhase(); // ~5s brief, then "Generate" pressed
                    await sequence(); // the existing build (unchanged)
                    startRun(); // auto-replay the whole experience
                }

                function startRun() {
                    RUN = {}; // invalidate any prior run's pending waits
                    reset();
                    resetIntake();
                    loop().catch(() => {});
                }

                startRun();
            })();
        </script>

        <script>
            (function () {
                var p = new URLSearchParams(location.search).get("theme");
                document.documentElement.className = p && /^t-[a-z]+$/.test(p) ? p : "t-studio";
                addEventListener("message", function (e) {
                    if (e.data && e.data.theme) document.documentElement.className = e.data.theme;
                });
            })();
        </script>
    </body>
