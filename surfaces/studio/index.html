<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Galleo — studio</title>
    <style>
        :root {
            --bg: #f4f0e8;
            --panel: #fbf8f1;
            --line: #e7e0d2;
            --ink: #211c16;
            --muted: #8c8273;
            --accent: #9a4f24;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; }
        body { font-family: system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg); }

        #app { height: 100vh; display: grid; grid-template-rows: 52px 1fr; }

        #topbar {
            display: flex; align-items: center; gap: 14px;
            padding: 0 18px; background: var(--panel); border-bottom: 1px solid var(--line);
        }
        #topbar .logo { font: 700 15px ui-monospace, monospace; letter-spacing: 0.04em; color: var(--accent); }
        #topbar .title { font-size: 13px; color: var(--muted); }
        #topbar .spacer { flex: 1; }
        #topbar button {
            font: 600 12px system-ui; color: var(--ink); background: #fff;
            border: 1px solid var(--line); border-radius: 8px; padding: 7px 12px; cursor: pointer;
        }
        #topbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

        #body { display: grid; grid-template-columns: 188px 1fr 296px; min-height: 0; }
        #minimap, #panel { overflow-y: auto; background: var(--panel); }
        #minimap { border-right: 1px solid var(--line); padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        #panel { border-left: 1px solid var(--line); padding: 18px; }
        #canvas { overflow-y: auto; padding: 32px 40px 140px; }

        .thumb {
            position: relative; display: block; width: 100%; padding: 0;
            border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
            background: #fffdf8; cursor: pointer; box-shadow: 0 1px 2px rgba(80, 55, 25, 0.05);
        }
        .thumb:hover { border-color: var(--accent); }
        .thumb-num { position: absolute; top: 4px; left: 6px; font: 600 10px ui-monospace, monospace; color: var(--muted); }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: #ddd5c4; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="app">
        <header id="topbar">
            <span class="logo">GALLEO</span>
            <span class="title">Untitled artifact</span>
            <span class="spacer"></span>
            <button>Present</button>
            <button>Share</button>
            <button class="primary">✦ Generate</button>
        </header>
        <div id="body">
            <aside id="minimap"></aside>
            <main id="canvas"></main>
            <aside id="panel"></aside>
        </div>
    </div>
    <script src="./demo.js"></script>
</body>
</html>
