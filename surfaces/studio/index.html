<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Galleo — engine demo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f0e8;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 24px;
            font-family: system-ui, sans-serif;
        }
        #note {
            position: fixed;
            top: 14px;
            left: 16px;
            font: 600 11px ui-monospace, monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8c8273;
        }
        #frame {
            border-radius: 18px;
            box-shadow: 0 24px 60px rgba(80, 55, 25, 0.16), 0 2px 6px rgba(80, 55, 25, 0.06);
        }
        #stage {
            position: relative;
        }
    </style>
</head>
<body>
    <div id="note">galleo · kernel engine · card → layout() → DOM render commands</div>
    <div id="frame"><div id="stage"></div></div>
    <script src="./demo.js"></script>
</body>
</html>
